<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Telemetria</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            margin: 40px;
        }

        h1 {
            color: #222;
        }

        .card {
            width: 320px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,.15);
        }

        p {
            font-size: 20px;
        }

        span {
            font-weight: bold;
        }

        button {
            margin-top: 15px;
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 6px;
            background: crimson;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Dados do Carro</h1>

        <p>Velocidade: <span id="velocidade">--</span> km/h</p>

        <p>Aceleração: <span id="aceleracao">--</span> m/s²</p>

        <p>Status do Motor: <span id="motor-status">--</span></p>

        <button id="kill-btn">
            KILL
        </button>

    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
